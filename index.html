<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>My calculator</title>
        <link rel="stylesheet" href="style.css" />
        <script src="index.js" defer></script>
    </head>
    <body>
        <div class="container">
            <input id="display" class="display" type="text" readonly value="0" />
            <div class="inputs">
                <button id="clearAll" class="operators" value="CA">CA</button>
                <button id="backspace" class="operators" value="X">X</button>
                <button id="parenthesisOp" class="operators" value="(">(</button>
                <button id="parenthesisClos" class="operators" value=")">)</button>
                <button class="numbers" value="1">1</button>
                <button class="numbers" value="2">2</button>
                <button class="numbers" value="3">3</button>
                <button class="operators" value="+">+</button>
                <button class="numbers" value="4">4</button>
                <button class="numbers" value="5">5</button>
                <button class="numbers" value="6">6</button>
                <button class="operators" value="-">-</button>
                <button class="numbers" value="7">7</button>
                <button class="numbers" value="8">8</button>
                <button class="numbers" value="9">9</button>
                <button class="operators" value="*">*</button>
                <button id="dot" class="operators" value=".">.</button>
                <button class="numbers" value="0">0</button>
                <button id="calculate" value="=">=</button>
                <button class="operators" value="/">/</button>
            </div>
            <p id="errMessages"></p>
        </div>
    </body>
</html>
